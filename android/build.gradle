buildscript {
    ext.kotlin_version = '1.7.1' // Ensure this matches the expected Kotlin version
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.0.0' // Ensure this version is compatible
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath 'com.google.gms:google-services:4.3.3' // Google Services plugin
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
